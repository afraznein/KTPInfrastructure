# KTP Local Development Environment
#
# Runs the full KTP stack locally — game servers + data server — mirroring
# production topology in a single compose project.
#
# All services share one Docker network so containers resolve each other
# by service name (ktp-game-1, ktp-game-2, data) via Docker DNS.
#
# Prerequisites:
#   make build                      # compile all KTP components
#   make extract-artifacts          # extract to artifacts/VERSION/
#   make local-build                # build runtime + data server images
#
# Usage:
#   make local-up                   # start all services
#   make local-down                 # stop
#   make local-logs                 # tail logs
#   docker compose -f docker-compose.local.yml logs -f data   # data server only
#
# Adding custom plugins (e.g., HUD Observer):
#   Drop .amxx files in local/plugins/ — copied into KTPAMXX plugins dir at startup.
#
# Environment variables:
#   VERSION            - Artifact version to use (default: latest)
#   KTP_PROJECT_ROOT   - Path to parent Git directory (default: ..)

services:
  # ============================================================
  # Game Server 1 — dod_anzio
  # ============================================================
  ktp-game-1:
    build:
      context: .
      dockerfile: runtime/Dockerfile
      args:
        VERSION: ${VERSION:-latest}
    image: ktp-gameserver:${VERSION:-latest}
    # depends_on removed — game servers boot fine without the data service.
    # The HUD ingest URL resolves to a stub when data is absent; no runtime error.
    # Bring up the data service alongside game servers with `--profile full`.
    environment:
      MAP: dod_anzio
      MAXPLAYERS: "13"
      RCON_PASSWORD: "${RCON_PASSWORD:-changeme}"
      SERVER_HOSTNAME: "KTP Local Dev #1"
    tty: true
    stdin_open: true
    entrypoint: ["bash", "/entrypoint.sh"]
    command: ["-console", "-norestart"]
    volumes:
      - ./config/local:/config:ro
      - ./local/plugins:/plugins:ro
      # Prod-mirrored match-time map configs (configs/ktp_<map>.cfg -> ktpbasic.cfg).
      # Without these, KTPMatchHandler's exec_map_config misses, mp_clan_match is
      # never armed, and the engine silently ignores mp_clan_restartround at
      # go-live (no countdown, no round restart, no half-timer rebase).
      - ./config/local/dod-configs:/opt/hlds/dod/configs:ro
    ports:
      - "27016:27015/udp"
      - "27016:27015/tcp"
      - "26900:26900/udp"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f hlds_linux > /dev/null"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  # ============================================================
  # Game Server 2 — dod_flash (optional, comment out if not needed)
  # ============================================================
  ktp-game-2:
    image: ktp-gameserver:${VERSION:-latest}
    # depends_on removed — see ktp-game-1. Use `--profile full` to include data.
    environment:
      MAP: dod_flash
      MAXPLAYERS: "13"
      RCON_PASSWORD: "${RCON_PASSWORD:-changeme}"
      SERVER_HOSTNAME: "KTP Local Dev #2"
    tty: true
    stdin_open: true
    entrypoint: ["bash", "/entrypoint.sh"]
    command: ["-console", "-norestart"]
    volumes:
      - ./config/local:/config:ro
      - ./local/plugins:/plugins:ro
      - ./config/local/dod-configs:/opt/hlds/dod/configs:ro
    ports:
      - "27017:27015/udp"
      - "27017:27015/tcp"
      - "26901:26900/udp"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f hlds_linux > /dev/null"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  # ============================================================
  # Data Server — MySQL, HLTV proxies, HLStatsX stub,
  #               HUD Observer backend + frontend (supervisord)
  # ============================================================
  # Behind the `full` profile so the standard `make local-up` works without
  # needing the sibling DoD-hud-observer checkout. Opt in with:
  #   DOD_HUD_PATH=../DoD-hud-observer make local-up-full
  # or:
  #   docker compose -f docker-compose.local.yml --profile full up -d
  data:
    profiles: ["full"]
    build:
      # Context is DoD-hud-observer — its .dockerignore excludes node_modules/.git.
      # Dockerfile lives there too, with COPY paths relative to its own root.
      context: ${DOD_HUD_PATH:-../DoD-hud-observer}
      dockerfile: data-server/Dockerfile
    image: ktp-dataserver:${VERSION:-latest}
    environment:
      # Tell the backend to read the bind-mounted config below instead of the
      # one COPY'd into the image at build time. Mirrors how production sets
      # HUD_CONFIG_PATH on the systemd unit. Without this override the backend
      # resolves config relative to its own __dirname and reads
      # /app/config/local/config.yaml (the image-baked default), so the bind
      # mount would be a no-op.
      HUD_CONFIG_PATH: /app/config.yaml
    volumes:
      # Backend config (auth key, ports, storage, hltv_sync). Source of truth
      # for the local docker stack — edit this file, restart the data container.
      - ./config/local/config.yaml:/app/config.yaml:ro
      # HLTV proxy configs — staged at /host-cfgs and copied into the instance
      # dirs by start.sh. Mounting them directly at /opt/hltv/instance-N/hltv.cfg
      # breaks the 32-bit HLTV binary's stat() on Docker Desktop / WSL2 because
      # the bind-mount synthesizes 64-bit inodes that overflow stat32 (EOVERFLOW),
      # the cfg silently falls back to default port 27020, and both instances
      # race for the same port.
      - ./test-env/data/hltv-1.cfg:/host-cfgs/hltv-1.cfg:ro
      - ./test-env/data/hltv-2.cfg:/host-cfgs/hltv-2.cfg:ro
      # HLTV demo recordings (persist across restarts)
      - ./test-env/data/demos:/opt/hltv/demos
      # MySQL data (persist across restarts)
      - ktp-mysql-data:/var/lib/mysql
    ports:
      # Frontend (OBS browser source)
      - "3000:3000"
      # Backend REST API
      - "3001:3001"
      # Socket.IO
      - "4000:4000"
      # HTTP ingest from AMXX plugin
      - "8088:8088"
      # HLTV proxies
      - "27020:27020/udp"
      - "27021:27021/udp"
      # HLStatsX log receiver
      - "27500:27500/udp"
      # MySQL (for debugging)
      - "3306:3306"

volumes:
  ktp-mysql-data:
