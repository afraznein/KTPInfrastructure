; KTP Discord Integration Configuration
; Profile: Local Development
;
; Discord disabled for local dev — no external network needed.
; Key names match the plugins' scheme (discord_relay_url / discord_auth_secret
; / discord_channel_id* incl. _12man/_admin/_default) so a local config
; validates the same shape as prod. Values stay EMPTY and UNQUOTED — the
; parsers do copy+trim only, so a quoted "" is a real 2-char value that would
; enable Discord with garbage config.

