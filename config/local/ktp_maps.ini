; KTPMatchHandler / KTPAdminAudit map list config
; Profile: Local Development
;
; MIRROR OF PRODUCTION (NY1 2026-07-11): KTPMatchHandler parses the sectioned
; format ([map] + config/name/type) to resolve the match-time map config
; (exec_map_config -> configs/ktp_<map>.cfg -> ktpbasic.cfg -> mp_clan_match 1).
; The old simple "map = name" local format made every lookup MISS, so clan
; mode was never armed and mp_clan_restartround silently no-opped at go-live.
; The referenced configs/*.cfg files must exist in dod/configs/ (see
; docs or docker cp from prod).

; ==========================================
; KTP Match Handler - Map Configuration
; ==========================================
;
; New section-based format (v0.4.0+)
; Each map has its own [section] with config, name, and type
;
; Format:
; [map_name_without_bsp]
; config = config_file.cfg
; name = Display Name
; type = competitive
;
; ==========================================
; POPULAR MAPS (ordered by usage)
; ==========================================

