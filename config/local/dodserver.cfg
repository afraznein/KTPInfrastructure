//===============================================
//             KTP DoD Server Config
//             Profile: Local Development
//===============================================
// Tuned for local Docker testing:
//   - sv_lan 1 (no Steam auth)
//   - No external service references
//   - Short timelimit for quick iteration

//-----------------------------------------------
//               Server Identity
//-----------------------------------------------
hostname "KTP Local Dev"
sv_region 255
sv_lan 1
rcon_password "changeme"
sv_password ""

//-----------------------------------------------
//               Gameplay Settings
//-----------------------------------------------
mp_autocrosshair 0
mp_flashlight 1
mp_friendlyfire 0
mp_fraglimit 0
mp_timelimit 20
mp_limitteams 0
mp_allowspectators 1
mp_deathmsg 1
mp_falldamage 1
mp_footsteps 1
sv_cheats 0
sv_maxspectators 4
pausable 0
decalfrequency 30

//-----------------------------------------------
//               Downloads
//-----------------------------------------------
sv_allowdownload 1
sv_allowupload 1
hpk_maxsize 1

//-----------------------------------------------
//               Physics
//-----------------------------------------------
sv_accelerate 10
sv_aim 0
sv_airaccelerate 10
sv_airmove 1
sv_bounce 1
sv_clienttrace 3.5
sv_clipmode 0
sv_friction 4
sv_gravity 800
sv_maxspeed 500
sv_stepsize 18
sv_stopspeed 100
sv_wateraccelerate 10
sv_waterfriction 1
edgefriction 2

//-----------------------------------------------
//               DoD Settings
//-----------------------------------------------
mp_clan_mg42_limit 0

// NOTE on clan-match cvars (mp_clan_match etc.): do NOT set them here — the
// DoD gamedll resets them at map init, so boot-time values are dead. Prod arms
// them at MATCH TIME via KTPMatchHandler's exec_map_config → configs/ktp_<map>.cfg
// → configs/ktpbasic.cfg (mp_clan_match 1, mp_clan_timer 10, ...). Local parity
// requires the sectioned ktp_maps.ini (config/local/ktp_maps.ini) + the
// dod/configs/*.cfg files present in the container. Without them the engine
// silently IGNORES mp_clan_restartround at go-live (verified 2026-07-11: no
// countdown, no timer rebase).

traceroffset 100
tracerlength 0.45
tracerred 1.3
tracergreen 0.7
tracerblue 0.1
traceralpha 0.45
tracerspeed 6250

//-----------------------------------------------
//               Netcode & Rates
//-----------------------------------------------
sv_unlag 1
sv_maxunlag 0.5  // 500ms max rewind window
sv_unlagsamples 1  // Engine default. Raising it widens the SV_CalcClientTime jitter guard, so one ping spike can silently zero out lag comp for that shot — do not raise
sv_minupdaterate 100
sv_maxupdaterate 120
sv_mincmdrate 100
sv_maxcmdrate 500
sv_minrate 100000
sv_maxrate 100000  // Locked equal to sv_minrate — identical client bandwidth budgets; do not raise without a fleet decision

//-----------------------------------------------
//               Class Limits (KTP competitive)
//-----------------------------------------------
// Allies
mp_limitalliesgarand 3
mp_limitalliescarbine 1
mp_limitalliesthompson 2
mp_limitalliesgreasegun 0
mp_limitalliesspring 1
mp_limitalliesbar 2
mp_limitallies30cal 0
mp_limitalliesbazooka 0

// Axis
mp_limitaxiskar 2
mp_limitaxisk43 1
mp_limitaxismp40 2
mp_limitaxismp44 2
mp_limitaxisscopedkar 1
mp_limitaxisfg42 0
mp_limitaxisfg42s 0
mp_limitaxismg34 0
mp_limitaxismg42 0
mp_limitaxispschreck 0
mp_combinemglimits 1

mp_teamlimit -1

//-----------------------------------------------
//               KTP Plugin Settings
//-----------------------------------------------
ktp_grenade_dmg 1
ktp_grenade_dmg_reduce 0

// HUD Observer — data service on the shared compose network
// 'data' resolves via Docker DNS (same compose project, no host routing needed)
dod_hud_url "http://data:8088/ingest"
dod_hud_key "changeme"

//-----------------------------------------------
//               Server Performance
//-----------------------------------------------
sys_ticrate 1000
sv_stats 0
max_queries_sec 3
max_queries_sec_global 100
mapchangecfgfile "dodserver.cfg"

//-----------------------------------------------
//               ReHLDS Flood Protection
//-----------------------------------------------
sv_rehlds_movecmdrate_max_burst 10000
sv_rehlds_movecmdrate_burst_punish -1
sv_rehlds_stringcmdrate_max_burst 800
sv_rehlds_stringcmdrate_burst_punish -1

//-----------------------------------------------
//               Logging
//-----------------------------------------------
log on
sv_logbans 1
sv_logecho 1
sv_logfile 1
sv_log_onefile 0
dodstats_pause 0

//-----------------------------------------------
//               Voice
//-----------------------------------------------
sv_voicecodec voice_speex
sv_voicequality 2

//-----------------------------------------------
//               Initialization
//-----------------------------------------------
exec listip.cfg
exec banned.cfg
