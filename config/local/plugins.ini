; KTPAMXX Plugin Configuration
; Profile: Local Development
;
; Core KTP plugins enabled. External service plugins (Discord, HLTV)
; are included but become no-ops without configured URLs.
;
; Additional plugins (e.g., KTPHudObserver.amxx) are loaded by dropping
; them in local/plugins/ — the entrypoint copies them into place at startup
; and they must be listed here to be loaded by KTPAMXX.

; Core match handling
KTPMatchHandler.amxx

; Security plugins
ktp_cvar.amxx
ktp_file.amxx

; Admin tools
KTPAdminAudit.amxx

; HLTV integration (no-op without API URL)
; KTPHLTVRecorder.amxx

; Gameplay modifications
KTPGrenadeLoadout.amxx
KTPGrenadeDamage.amxx

; Practice mode (uncomment for testing)
; KTPPracticeMode.amxx

; HUD Observer broadcast overlay (deployed via local/plugins/)
KTPHudObserver.amxx
