hostname "KTP CLASSIC DOD Match In Progress"

// Rates, these will be updated to match any changes in the rules
sv_minupdaterate 100
sv_maxupdaterate 120
sv_mincmdrate 100
sv_maxcmdrate 500
sv_maxrate 100000
sv_minrate 100000

// Allies class limits
mp_limitalliesgarand 4    // Garand
mp_limitalliesbar 3       // BAR
mp_limitalliesthompson 2  // Thompson
mp_limitalliescarbine 1   // Carbine
mp_limitalliesgreasegun 1 // Greasegun
mp_limitalliesbazooka 0   // Bazooka
mp_limitalliesspring 1    // Sniper
mp_limitallies30cal 1     // 30 Cal MG

// Axis class limits
mp_limitaxiskar 3         // Kar98
mp_limitaxisk43 1         // Kar43
mp_limitaxismp44 3        // STG
mp_limitaxismp40 3        // MP40
mp_limitaxisfg42 0        // FG42 Bipod
mp_limitaxisfg42s 0       // FG42 Scoped
mp_limitaxispschreck 0    // Panzerschreck
mp_limitaxisscopedkar 1   // Sniper
mp_limitaxismg42 1        // MG42
mp_limitaxismg34 0        // MG34
mp_combinemglimits 1

// British class limits
mp_limitbritlight 4       // Enfield
mp_limitbritmg 3          // Bren
mp_limitbritassault 3    // Sten
mp_limitbritpiat 0            // Piat
mp_limitbritsniper 1      // Sniper

// These settings are the default, but might be overridden in the map config
mp_clan_scoring_delay 30          
mp_clan_scoring_bonus_allies 40   
mp_clan_scoring_bonus_axis 40     
mp_timelimit 20                   // Overtime round: 5 min
                                  // All-stars regulation round: 10 min
                                  // All-stars overtime round: 4 min


// These settings should remain constant
mp_allowroaming 0
mp_allowspectators 1
mp_autocrosshair 0
mp_bulletwhizz 0
mp_clan_match 1
mp_clan_ready_signal ready
mp_clan_respawntime 10
mp_clan_scoring 1
mp_clan_timer 10
mp_consistency 1
mp_deathmsg 1
mp_fadetoblack 0
mp_falldamage 1
mp_flashlight 1
mp_footsteps 1
mp_forcecamera 4
mp_forcechasecam 1
mp_friendlyfire 1
mp_teamlimit -1
mp_teamplay 11
mp_tkpenalty -1
mp_weaponstay 0
pausable 0
sv_accelerate 10
sv_aim 0
sv_airaccelerate 10
sv_airmove 1
sv_allowdownload 0
sv_allowupload 0
sv_alltalk 0
sv_bounce 1
sv_cheats 0
sv_clienttrace 3.5
sv_clipmode 0
sv_friction 4
sv_gravity 800
sv_maxspectators 2
sv_maxspeed 500 
sv_stepsize 18
sv_stopspeed 100
sv_unlag 1
sv_wateraccelerate 10
sv_waterfriction 1
decalfrequency 30
edgefriction 2
fakelag 0
fakeloss 0
traceralpha 0.45
tracerblue 0.1
tracergreen 0.7
tracerlength 0.45
traceroffset 100
tracerred 1.3
tracerspeed 6250



// Logo distribution off during matches - HPAK upload processing stalls the frame loop
// when someone (re)connects mid-match. dodserver.cfg restores 1 at next map load.
sv_send_logos 0
