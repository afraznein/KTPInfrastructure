//===============================================
//   KTP LAN — Warmup / Pub Server (STOCK HLDS)
//   Port 27050 · 24 slots · no plugins · no HLTV
//   Separate manual install from the 5 competitive servers.
//===============================================
// Replace <LAN_IP> with the venue IP (FastDL) and <WARMUP_RCON> with the warmup
// rcon password at deploy — this file is in a PUBLIC repo, so no live secret here.

hostname "KTP LAN - Warmup"
sv_region 255
sv_lan 0                            // Steam auth, matches the competitive box (needs venue internet).
                                    // Flip to 1 if you want warmup to survive an internet drop (no stats here anyway).
rcon_password "<WARMUP_RCON>"       // THIS server only — for an admin to change maps on the fly.

//-----------------------------------------------
//   Map rotation: pandemic_aim -> orange -> repeat, 60 min each
//-----------------------------------------------
mp_timelimit 60
mapcyclefile "mapcycle.txt"
servercfgfile "dodserver.cfg"
mapchangecfgfile "dodserver.cfg"    // re-assert these settings on every map change

//-----------------------------------------------
//   Downloads (clients pull maps/assets from FastDL)
//-----------------------------------------------
sv_allowdownload 1
sv_allowupload 1
sv_downloadurl "http://<LAN_IP>/dod/"
hpk_maxsize 1

//-----------------------------------------------
//   Performance — stock high-fps
//-----------------------------------------------
sys_ticrate 1000
sv_stats 0

//-----------------------------------------------
//   Logging OFF (pub box — keep its disk I/O off the game path)
//-----------------------------------------------
log off
sv_logfile 0
sv_log_onefile 0
sv_logbans 0
sv_logecho 0
mp_logdetail 0
mp_logmessages 0
mp_logecho 0
developer 0

//-----------------------------------------------
//   Pub-friendly gameplay
//-----------------------------------------------
mp_friendlyfire 0
mp_autocrosshair 0
mp_flashlight 1
mp_falldamage 1
mp_footsteps 1
mp_allowspectators 1
sv_cheats 0
pausable 0
decalfrequency 30

//-----------------------------------------------
//   Rates
//-----------------------------------------------
sv_unlag 1
sv_maxunlag 0.5
sv_minupdaterate 100
sv_maxupdaterate 120
sv_minrate 0
sv_maxrate 100000

exec listip.cfg
exec banned.cfg
