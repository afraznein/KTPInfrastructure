; KTPAMXX Module Configuration
; Profile: LAN (offline mode)
;
; KTP runs AMXX in extension mode — no Metamod. Only the three KTP extension
; modules are loaded, SAME as the online profile. Adding fun / engine /
; fakemeta / hamsandwich here would try to load modules that don't exist in
; extension-mode artifacts and break server startup (the pre-2026-07-07
; version of this file did exactly that).
;
; Keep in sync with config/online/modules.ini.

reapi          ; ReHLDS engine hooks (pause, RCON audit, map change)
dodx           ; DoD stats, forwards (client_death, prone, CP), natives
amxxcurl       ; Non-blocking HTTP — LAN Discord config is empty so posts no-op
