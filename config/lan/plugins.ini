; KTPAMXX Plugin Configuration
; Profile: LAN (offline mode)
;
; Mirrors config/online/plugins.ini (same load-order constraints: admin base
; before flag consumers, stats_logging before KTP client_death consumers).
; Discord-consuming plugins stay enabled — the LAN discord.ini is empty so
; posts no-op. The pre-2026-07-07 version omitted admin.amxx (AdminAudit
; menus dead), stats_logging (HLStatsX received nothing), KTPHLTVRecorder
; (HLTV API had no driver), and KTPPracticeMode — all restored.
;
; Plugins are loaded in order listed (top -> bottom). Comment to disable.

; AMXX base (required — provides admin flag infrastructure)
admin.amxx

; DoD stats (AMXX stock plugin — feeds HLStatsX via DODX)
stats_logging.amxx

; KTP admin + security
KTPAdminAudit.amxx
ktp_cvar.amxx
ktp_file.amxx

; Core match handling
KTPMatchHandler.amxx

; HLTV integration (.hltvrestart + match-start /state check; the LAN
; dataserver phase provisions the API + always-on recording)
KTPHLTVRecorder.amxx

; Practice mode (inert unless enabled per-match)
KTPPracticeMode.amxx

; Gameplay modifications
KTPGrenadeLoadout.amxx
KTPGrenadeDamage.amxx

; HUD Observer broadcast overlay — enabled on all servers for the LAN broadcast
; (the KTPHudObserver.amxx binary must be present in artifacts/plugins; no debug
; flag — a debug-loaded plugin disables the AMXX JIT for EVERY plugin on the host)
KTPHudObserver.amxx
