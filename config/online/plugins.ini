; KTPAMXX Plugin Configuration
; Profile: ONLINE (production)
;
; Plugin load order mirrors Denver 5 / ATL1:27015 / NY1:27015 (spot-checked
; 2026-04-22). The AMXX admin base must load before any plugin that uses
; admin flags, and stats_logging (which hooks DODX death forwards) must
; load before KTP plugins that also consume client_death so dispatch order
; is deterministic.
;
; Plugins are loaded in order listed (top → bottom). Comment to disable.
;
; No `debug` flags here — per Tony's dev/prod split (2026-04-24 Discord):
; keep `debug` on every plugin in config/local/plugins.ini while developing,
; drop it in production. AMXX clears AMX_FLAG_JITC globally if any plugin
; is loaded with `debug` (amxmodx modules.cpp ConfigureDebug), so a single
; stray `debug` here disables the JIT across the entire plugin surface.
; Today's live servers still have `debug` on KTPHudObserver.amxx; this file
; is the target-prod state the fleet is migrating toward.

; AMXX base (required — provides admin flag infrastructure)
admin.amxx

; DoD stats (AMXX stock plugin — hooks client_death via DODX)
stats_logging.amxx

; KTP admin + security
KTPAdminAudit.amxx
ktp_cvar.amxx
ktp_file.amxx

; Core match handling
KTPMatchHandler.amxx

; HLTV integration
KTPHLTVRecorder.amxx

; Practice mode (loaded on all servers; inert unless enabled per-match)
KTPPracticeMode.amxx

; Gameplay modifications
KTPGrenadeLoadout.amxx
KTPGrenadeDamage.amxx

; HUD Observer broadcast overlay (deployed per-host; verified on Denver 27019,
; ATL1:27015, NY1:27015 on 2026-04-22)
KTPHudObserver.amxx

; KTPScoreTracker — per-instance opt-in, NOT fleet-wide (live sweep 2026-07-07:
; loaded on no NYC instance nor either sampled 27015; the compiled .amxx ships
; in the staging batch for instances that want verbose capture scoring).
; Uncomment where wanted.
; KTPScoreTracker.amxx
