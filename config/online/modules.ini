; KTPAMXX Module Configuration
; Profile: ONLINE (production)
;
; KTP runs AMXX in extension mode — no Metamod. Only the three KTP extension
; modules are loaded. Adding fun / engine / fakemeta / hamsandwich here would
; try to load modules that don't exist in extension-mode artifacts and break
; server startup.
;
; Matches deployed state on Denver 5 / ATL1:27015 / NY1:27015 (verified
; 2026-04-22). Keep in sync with config/local/modules.ini.
;
; Modules are loaded in order listed. Comment out to disable.

; Short names match deployed state exactly. AMXX's modules.cpp
; ConvertModuleName() resolves both short (`reapi`) and long
; (`reapi_ktp_i386.so`) forms to the same file, so either works at
; runtime — the short form is authoritative because that's what the
; live servers have.
reapi          ; ReHLDS engine hooks (pause, RCON audit, map change)
dodx           ; DoD stats, forwards (client_death, prone, CP), natives
amxxcurl       ; Non-blocking HTTP for Discord / HLStatsX / HUD Observer
