# KTP Tier 1 — Reusable smoke workflow
#
# Two paths to a booted, smoke-tested game server:
#
#   FAST PATH (default, use_base_image: true):
#     Pull pre-built ghcr.io/<owner>/ktp-runtime-test-base:latest, build
#     ONLY the under-test artifact, overlay it onto the base. ~3-5 min.
#     Base image is rebuilt nightly by publish-base-image.yml.
#
#   SLOW PATH (use_base_image: false):
#     Sibling-checkout 14 repos, run `make build` from scratch, build the
#     full runtime image. ~12-20 min. Used as a fallback when the base
#     image is missing or stale, OR for the publish-base-image.yml run
#     itself (which can't pull what it's about to build).
#
# Caller chooses by setting under_test_kind:
#   'cpp_module'  — KTPAmxxCurl-shape repo. Builds via `make ${make_build_target}`.
#                   Needs a few extra repo checkouts (KTPAMXX, KTPhlsdk).
#   'amx_plugin'  — Plugin-shape repo. Compiles via amxxpc inside the base
#                   image, no extra checkouts needed.
#
# See KTPInfrastructure/tests/smoke/README.md and docs/CI_SETUP.md for
# the design rationale, GHCR setup, and per-caller wiring.

name: Tier 1 Smoke (callable)

on:
  workflow_call:
    inputs:
      under_test_label:
        description: Display name of the change-under-test
        required: true
        type: string
      under_test_kind:
        description: "'cpp_module' or 'amx_plugin' — selects build path"
        required: false
        type: string
        default: 'amx_plugin'
      make_build_target:
        description: "For cpp_module: which `make` target builds the artifact (e.g. 'build-curl')"
        required: false
        type: string
        default: ''
      amxx_source:
        description: "For amx_plugin: path to .sma file relative to caller repo (e.g. 'KTPMatchHandler.sma')"
        required: false
        type: string
        default: ''
      artifact_host_path:
        description: >-
          Path on host (relative to workspace) where the just-built artifact
          ends up. For cpp_module: e.g. `KTPInfrastructure/artifacts/ci/ktpamx/modules/amxxcurl_ktp_i386.so`.
          For amx_plugin: e.g. `/tmp/under-test/KTPMatchHandler.amxx` (set by the
          amx-build step itself; caller doesn't need to pass).
        required: false
        type: string
        default: ''
      artifact_container_path:
        description: >-
          Where in the runtime container the artifact must end up. Required for
          fast path. Examples:
            cpp_module: /opt/hlds/dod/addons/ktpamx/modules/amxxcurl_ktp_i386.so
            amx_plugin: /opt/hlds/dod/addons/ktpamx/plugins/KTPMatchHandler.amxx
        required: false
        type: string
        default: ''
      use_base_image:
        description: Use the GHCR base image fast path (default true)
        required: false
        type: boolean
        default: true
      assert_module:
        description: Module name to assert loaded (truncation-aware match)
        required: false
        type: string
        default: ''
      assert_plugin:
        description: Plugin name to assert running (truncation-aware match)
        required: false
        type: string
        default: ''
      caller_repo_path:
        description: >-
          Path under workspace where the caller's repo should be checked out
          (e.g. `KTPAmxxCurl`). Defaults to the github.event.repository.name
          context value when left empty.
        required: false
        type: string
        default: ''
      ktp_owner:
        description: >-
          GitHub owner that publishes the KTP infrastructure (KTPInfrastructure
          repo, sibling KTP plugin repos, and the GHCR base image). Defaults to
          `afraznein` — the canonical KTP owner. External callers under a
          different owner (e.g. JimmyLockhart65616/DoD-hud-observer) inherit the
          correct default and don't need to override. Forks under a non-KTP
          owner can override only if they actually publish their own image and
          repo set, which is uncommon.
        required: false
        type: string
        default: 'afraznein'
    secrets:
      ktp_checkout_token:
        description: PAT for cross-repo checkout (required for private KTP repos)
        required: false

jobs:
  smoke:
    name: ${{ inputs.under_test_label }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    env:
      VERSION: ci
      RCON_PASSWORD: changeme
      BASE_IMAGE: ghcr.io/${{ inputs.ktp_owner }}/ktp-runtime-test-base:latest
      CALLER_REPO_DIR: ${{ inputs.caller_repo_path != '' && inputs.caller_repo_path || github.event.repository.name }}

    steps:
      # ============================================================
      # ALWAYS: caller repo + KTPInfrastructure + Python
      # ============================================================
      - name: Checkout caller repo (under test)
        uses: actions/checkout@v6
        with:
          path: ${{ inputs.caller_repo_path != '' && inputs.caller_repo_path || github.event.repository.name }}

      - name: Checkout KTPInfrastructure
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTPInfrastructure
          path: KTPInfrastructure
          token: ${{ secrets.ktp_checkout_token || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # ============================================================
      # FAST PATH: minimal extra checkouts (cpp_module only)
      # AMX plugins compile inside the base image — no extra source needed.
      # ============================================================
      - name: Checkout KTPAMXX (fast path, cpp_module headers — with submodules)
        if: ${{ inputs.use_base_image && inputs.under_test_kind == 'cpp_module' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTPAMXX
          path: KTPAMXX
          submodules: recursive
          token: ${{ secrets.ktp_checkout_token || github.token }}

      - name: Checkout KTPhlsdk (fast path, cpp_module headers)
        if: ${{ inputs.use_base_image && inputs.under_test_kind == 'cpp_module' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTPHLSDK
          path: KTPhlsdk
          token: ${{ secrets.ktp_checkout_token || github.token }}

      # ============================================================
      # SLOW PATH: full 14-repo sibling checkout
      # ============================================================
      - name: Checkout KTPReHLDS (slow path)
        if: ${{ !inputs.use_base_image }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTP-ReHLDS
          path: KTPReHLDS
          token: ${{ secrets.ktp_checkout_token || github.token }}

      - name: Checkout KTPAMXX (slow path, with submodules — public/amtl)
        if: ${{ !inputs.use_base_image && inputs.under_test_kind != 'cpp_module' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTPAMXX
          path: KTPAMXX
          submodules: recursive
          token: ${{ secrets.ktp_checkout_token || github.token }}

      # Metamod headers are vendored in KTPAMXX/third_party/metamod/ since
      # 2026-04-29 (KTPAMXX 2.7.14); no longer needs an external checkout.

      - name: Checkout KTPReAPI (slow path)
        if: ${{ !inputs.use_base_image }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTP-ReAPI
          path: KTPReAPI
          token: ${{ secrets.ktp_checkout_token || github.token }}

      - name: Checkout KTPhlsdk (slow path)
        if: ${{ !inputs.use_base_image && inputs.under_test_kind != 'cpp_module' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTPHLSDK
          path: KTPhlsdk
          token: ${{ secrets.ktp_checkout_token || github.token }}

      - name: Checkout KTPAmxxCurl (slow path)
        if: ${{ !inputs.use_base_image && env.CALLER_REPO_DIR != 'KTPAmxxCurl' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTPAMXXCurl
          path: KTPAmxxCurl
          token: ${{ secrets.ktp_checkout_token || github.token }}

      - name: Checkout KTPMatchHandler (slow path)
        if: ${{ !inputs.use_base_image && env.CALLER_REPO_DIR != 'KTPMatchHandler' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTPMatchHandler
          path: KTPMatchHandler
          token: ${{ secrets.ktp_checkout_token || github.token }}

      - name: Checkout KTPHLTVRecorder (slow path)
        if: ${{ !inputs.use_base_image && env.CALLER_REPO_DIR != 'KTPHLTVRecorder' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTPHLTVRecorder
          path: KTPHLTVRecorder
          token: ${{ secrets.ktp_checkout_token || github.token }}

      - name: Checkout KTPCvarChecker (slow path)
        if: ${{ !inputs.use_base_image && env.CALLER_REPO_DIR != 'KTPCvarChecker' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTPCvarChecker
          path: KTPCvarChecker
          token: ${{ secrets.ktp_checkout_token || github.token }}

      - name: Checkout KTPFileChecker (slow path)
        if: ${{ !inputs.use_base_image && env.CALLER_REPO_DIR != 'KTPFileChecker' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTPFileChecker
          path: KTPFileChecker
          token: ${{ secrets.ktp_checkout_token || github.token }}

      - name: Checkout KTPAdminAudit (slow path)
        if: ${{ !inputs.use_base_image && env.CALLER_REPO_DIR != 'KTPAdminAudit' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTPAdminAudit
          path: KTPAdminAudit
          token: ${{ secrets.ktp_checkout_token || github.token }}

      - name: Checkout KTPGrenades (slow path)
        if: ${{ !inputs.use_base_image && env.CALLER_REPO_DIR != 'KTPGrenades' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTPGrenades
          path: KTPGrenades
          token: ${{ secrets.ktp_checkout_token || github.token }}

      - name: Checkout KTPPracticeMode (slow path)
        if: ${{ !inputs.use_base_image && env.CALLER_REPO_DIR != 'KTPPracticeMode' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTPPracticeMode
          path: KTPPracticeMode
          token: ${{ secrets.ktp_checkout_token || github.token }}

      - name: Checkout KTPScoreTracker (slow path)
        if: ${{ !inputs.use_base_image && env.CALLER_REPO_DIR != 'KTPScoreTracker' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.ktp_owner }}/KTPScoreTracker
          path: KTPScoreTracker
          token: ${{ secrets.ktp_checkout_token || github.token }}

      # KTPHudObserver lives in an external repo (JimmyLockhart65616/DoD-hud-
      # observer). First-class member of the smoke runtime — built into the
      # GHCR base image alongside KTP plugins; the slow path also needs the
      # source on disk so `make build-plugins` compiles it.
      # Skip when the caller IS HudObserver — its own checkout placed source
      # at CALLER_REPO_DIR (default = github.event.repository.name, which
      # would be "DoD-hud-observer", or KTPHudObserver if caller_repo_path
      # was set explicitly to align with the local convention).
      - name: Checkout KTPHudObserver (slow path; JimmyLockhart65616/DoD-hud-observer)
        if: ${{ !inputs.use_base_image && env.CALLER_REPO_DIR != 'KTPHudObserver' && env.CALLER_REPO_DIR != 'DoD-hud-observer' }}
        uses: actions/checkout@v6
        with:
          repository: JimmyLockhart65616/DoD-hud-observer
          path: KTPHudObserver

      # ============================================================
      # FAST PATH: pull base image, build under-test, overlay
      # ============================================================
      - name: Log in to GHCR
        if: ${{ inputs.use_base_image }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        if: ${{ inputs.use_base_image }}
        run: docker pull "$BASE_IMAGE"

      - name: Compile AMX plugin against base image
        if: ${{ inputs.use_base_image && inputs.under_test_kind == 'amx_plugin' }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/under-test
          SRC="${{ inputs.amxx_source }}"
          if [ -z "$SRC" ]; then
            echo "::error::amx_plugin path requires `amxx_source` input"
            exit 2
          fi
          # Run amxxpc INSIDE the base image. Includes for KTPAMXX core +
          # ktp_discord.inc etc. live at /opt/hlds/dod/addons/ktpamx/scripting/include
          # and amxxpc auto-searches there. Plugin-local include/ dir mounted
          # alongside if present.
          INCLUDES_ARG=""
          if [ -d "${CALLER_REPO_DIR}/include" ]; then
            INCLUDES_ARG="-i/work/include"
          fi
          BASENAME="$(basename "$SRC" .sma)"
          docker run --rm \
            -v "${PWD}/${CALLER_REPO_DIR}:/work:ro" \
            -v /tmp/under-test:/output \
            --entrypoint bash \
            "$BASE_IMAGE" \
            -c "cd /opt/hlds/dod/addons/ktpamx/scripting && \
                ./amxxpc /work/${SRC} ${INCLUDES_ARG} -o/output/${BASENAME}.amxx"
          echo "ARTIFACT_HOST_PATH=/tmp/under-test/${BASENAME}.amxx" >> "$GITHUB_ENV"

      - name: Build C++ module
        if: ${{ inputs.use_base_image && inputs.under_test_kind == 'cpp_module' }}
        working-directory: KTPInfrastructure
        run: |
          set -euo pipefail
          TARGET="${{ inputs.make_build_target }}"
          if [ -z "$TARGET" ]; then
            echo "::error::cpp_module path requires `make_build_target` input"
            exit 2
          fi
          export KTP_PROJECT_ROOT="$(cd .. && pwd)"
          make build-base "$TARGET" VERSION="$VERSION"
          ARTIFACT="${{ inputs.artifact_host_path }}"
          if [ -z "$ARTIFACT" ]; then
            echo "::error::cpp_module path requires `artifact_host_path` input"
            exit 2
          fi
          if [ ! -f "../$ARTIFACT" ]; then
            echo "::error::artifact not found at ../$ARTIFACT after $TARGET"
            exit 1
          fi
          echo "ARTIFACT_HOST_PATH=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Build smoke overlay image
        if: ${{ inputs.use_base_image }}
        run: |
          set -euo pipefail
          if [ -z "${{ inputs.artifact_container_path }}" ]; then
            echo "::error::fast path requires `artifact_container_path` input"
            exit 2
          fi
          # The artifact is at $ARTIFACT_HOST_PATH (set by the build step
          # above). Resolve to a path relative to the docker context root
          # (workspace).
          ART="${ARTIFACT_HOST_PATH}"
          if [ ! -f "$ART" ]; then
            ART="${GITHUB_WORKSPACE}/$ART"
          fi
          # Copy into a known location in the workspace so docker build
          # can see it (build context = workspace).
          mkdir -p "${GITHUB_WORKSPACE}/.smoke-artifact"
          cp "$ART" "${GITHUB_WORKSPACE}/.smoke-artifact/payload"
          docker build \
            -f "${GITHUB_WORKSPACE}/KTPInfrastructure/runtime/Dockerfile.smoke-overlay" \
            --build-arg BASE_IMAGE="$BASE_IMAGE" \
            --build-arg ARTIFACT_SRC=.smoke-artifact/payload \
            --build-arg ARTIFACT_DST="${{ inputs.artifact_container_path }}" \
            -t "ktp-gameserver:$VERSION" \
            "${GITHUB_WORKSPACE}"

      # ============================================================
      # SLOW PATH: full make build + runtime image build
      # ============================================================
      - name: Build all KTP components (slow path)
        if: ${{ !inputs.use_base_image }}
        working-directory: KTPInfrastructure
        run: |
          export KTP_PROJECT_ROOT="$(cd .. && pwd)"
          echo "KTP_PROJECT_ROOT=$KTP_PROJECT_ROOT"
          ls -la "$KTP_PROJECT_ROOT"
          make build VERSION="$VERSION"

      - name: Build runtime image (slow path)
        if: ${{ !inputs.use_base_image }}
        working-directory: KTPInfrastructure
        run: |
          export KTP_PROJECT_ROOT="$(cd .. && pwd)"
          docker compose -f docker-compose.local.yml build ktp-game-1

      # ============================================================
      # ALWAYS: boot, smoke, diagnostics, teardown
      # docker-compose.local.yml is configured to use ktp-gameserver:${VERSION}.
      # Both paths produced ktp-gameserver:ci above, so --no-build picks it up.
      #
      # Boot + wait-ready + wait-plugin_init + assert-no-failed are combined
      # here so the whole cluster can retry once on the fast path. The Layer 1
      # propagation check in publish-base-image.yml catches most GHCR
      # `:latest` cache races at publish time, but smoke runs triggered by
      # plugin pushes minutes later from a different runner could still pull
      # a stale manifest from a different GHCR edge. On retry, we tear down,
      # force-remove the local copy of the base image, re-pull, rebuild the
      # smoke overlay, and re-boot once. Slow path (use_base_image: false)
      # builds the runtime image locally and isn't subject to this race —
      # the retry is gated to fast path only.
      # ============================================================
      - name: Boot, wait, and assert (with single retry on fast-path)
        working-directory: KTPInfrastructure
        env:
          ARTIFACT_CONTAINER_PATH: ${{ inputs.artifact_container_path }}
          USE_BASE_IMAGE: ${{ inputs.use_base_image && '1' || '0' }}
        run: |
          set -uo pipefail

          boot_and_check() {
            export KTP_PROJECT_ROOT="$(cd .. && pwd)"
            docker compose -f docker-compose.local.yml up -d --no-build ktp-game-1 || return 1
            python -m tests.smoke.cli wait-ready --port 27016 --rcon-password "$RCON_PASSWORD" --timeout 120 || return 1

            # KTPAMXX defers plugin_init until AFTER precache phase finishes
            # (boot logs "Loaded N plugin(s) during precache (plugin_init
            # deferred)"). rcon answers ~1s after container start, but
            # `amx plugins` returns empty until plugin_init completes —
            # usually 5-15s after rcon. Poll until at least one plugin row.
            local rows=0
            local out=""
            for i in $(seq 1 60); do
              out=$(python -m tests.smoke.cli rcon "amx plugins" --port 27016 --rcon-password "$RCON_PASSWORD" 2>/dev/null || true)
              rows=$(echo "$out" | grep -cE '^\s*\[\s*[0-9]+\]' || true)
              if [ "$rows" -gt 0 ]; then
                echo "plugins ready after ${i}s ($rows plugin rows)"
                break
              fi
              sleep 1
            done
            if [ "${rows:-0}" -eq 0 ]; then
              echo "::error::plugin_init did not complete within 60s after rcon-ready"
              echo "--- last amx plugins output ---"
              echo "$out"
              return 1
            fi

            python -m tests.smoke.cli assert-no-failed --port 27016 --rcon-password "$RCON_PASSWORD"
          }

          refresh_base_image_and_overlay() {
            docker compose -f docker-compose.local.yml down -v 2>/dev/null || true
            # Force GHCR re-pull by removing the local copy first.
            docker rmi "$BASE_IMAGE" 2>/dev/null || true
            docker pull --quiet "$BASE_IMAGE"
            # Rebuild the smoke overlay with the freshly-pulled base. The
            # original overlay build saved the under-test artifact at
            # ${GITHUB_WORKSPACE}/.smoke-artifact/payload — reuse that.
            if [ ! -f "${GITHUB_WORKSPACE}/.smoke-artifact/payload" ]; then
              echo "::error::overlay payload missing at retry time — cannot rebuild"
              return 1
            fi
            docker build \
              -f "${GITHUB_WORKSPACE}/KTPInfrastructure/runtime/Dockerfile.smoke-overlay" \
              --build-arg BASE_IMAGE="$BASE_IMAGE" \
              --build-arg ARTIFACT_SRC=.smoke-artifact/payload \
              --build-arg ARTIFACT_DST="$ARTIFACT_CONTAINER_PATH" \
              -t "ktp-gameserver:$VERSION" \
              "${GITHUB_WORKSPACE}"
          }

          # First attempt
          if boot_and_check; then
            exit 0
          fi

          # Retry only on fast path. Slow path's runtime image was built
          # locally from source — it has no GHCR involvement, so a failure
          # there is real, not staleness.
          if [ "$USE_BASE_IMAGE" != "1" ]; then
            echo "::error::Slow-path boot+assert failed (no retry)"
            exit 1
          fi

          echo "::warning::Tier 1 smoke initial boot+assert failed on fast path."
          echo "::warning::Retrying once with forced GHCR re-pull (suspected :latest propagation race)."
          echo "::warning::See publish-base-image.yml Layer 1 verify step + KTPInfrastructure CHANGELOG 1.5.4 for context."
          refresh_base_image_and_overlay || exit 1
          if boot_and_check; then
            echo "::warning::Retry succeeded — original failure was GHCR propagation race, not a real bug."
            exit 0
          fi
          echo "::error::Retry also failed — this is likely a real failure, not staleness."
          exit 1

      - name: Assert module loaded
        if: ${{ inputs.assert_module != '' }}
        working-directory: KTPInfrastructure
        run: python -m tests.smoke.cli assert-modules --port 27016 --rcon-password "$RCON_PASSWORD" --expect "${{ inputs.assert_module }}"

      - name: Assert plugin running
        if: ${{ inputs.assert_plugin != '' }}
        working-directory: KTPInfrastructure
        run: python -m tests.smoke.cli assert-plugins --port 27016 --rcon-password "$RCON_PASSWORD" --expect "${{ inputs.assert_plugin }}"

      - name: Container logs on failure
        if: failure()
        working-directory: KTPInfrastructure
        run: docker compose -f docker-compose.local.yml logs --tail 400 --no-color ktp-game-1

      - name: Live amxx state on failure
        if: failure()
        working-directory: KTPInfrastructure
        continue-on-error: true
        run: |
          python -m tests.smoke.cli rcon "amx modules" --port 27016 --rcon-password "$RCON_PASSWORD" || true
          python -m tests.smoke.cli rcon "amx plugins" --port 27016 --rcon-password "$RCON_PASSWORD" || true

      - name: Tear down
        if: always()
        working-directory: KTPInfrastructure
        run: docker compose -f docker-compose.local.yml down -v
