# KTP Tier 2 — Integration tests against a real hlds_linux subprocess.
#
# Runs the pytest suite at tests/integration/ on a self-hosted runner that
# has a writable test serverfiles tree on ext4 (WSL DrvFs is incompatible
# with hlds_linux per memory `wsl_drvfs_hlds_incompatibility.md`). The
# runner pre-stages compiled test-mode artifacts:
#
#   - KTPMatchHandler.amxx (test-mode build, compiled/test/)
#   - KTPWitness.amxx (1.x.0+, witness/compiled/)
#   - dodx_ktp_i386.so (with test-only natives, KTPAMXX build output)
#
# The workflow assumes these are present at $KTP_HLDS_SERVERFILES.
# `tests/integration/CI_RUNNER_SETUP.md` documents the registration +
# staging procedure.
#
# Why self-hosted vs GitHub-hosted runners:
#   - hlds_linux is a 32-bit binary that needs ~50MB of game assets +
#     libsteam_api.so + KTPAMXX core. Bundling all that into a GH-hosted
#     runner image would inflate the image to >2GB; bake time per CI run
#     would be >5min just to set up. A self-hosted runner with the tree
#     pre-staged drops to <30s setup.
#   - Tier 2 needs a stable test environment with deterministic IO timing.
#     GH-hosted runners share infra; their performance varies enough to
#     introduce flakes in our 5s polling timeouts.
#
# Trigger model:
#   - Manually via workflow_dispatch (operator-driven, with timeout multiplier)
#   - On every PR to main — required status check per branch protection on
#     `main` (flipped from warn-only after 2 weeks green-on-main, original
#     design decision 2026-04-24, applied 2026-05-18).
#   - Nightly via schedule (09:00 UTC) — keeps the live plugin stack exercised
#     between PRs; paired with scripts/ktp-tier2-heartbeat.sh (data-server cron)
#     which alerts on a missing/stale/failed last-run marker so a dead runner is
#     not silently green.
#
# No `paths:` filter on `pull_request:` — workflow fires on every PR to main
# so the required status check `Tier 2 Integration / integration` always
# reports back. The job itself decides whether to run pytest based on what
# actually changed (see "Detect relevant changes" step). This avoids the
# GitHub-Actions gotcha where a `paths:`-filtered required check is silently
# skipped on docs-only / scripts-only PRs, leaving the PR un-mergeable
# without `--admin` override. Same self-skip-pass pattern as
# `config-tests.yml` (commit `99b0abf`).

name: Tier 2 Integration

on:
  workflow_dispatch:
    inputs:
      timeout_multiplier:
        description: 'Scale all test timeouts (1.0 = default, 2.0 = slow CI)'
        required: false
        type: string
        default: '1.0'
  schedule:
    # Nightly at 09:00 UTC (≈04-05 ET) — after the 03:00 ET fleet restart +
    # perf rollups. Tier 2 otherwise only fires on PRs that touch
    # tests/integration/, so it can go weeks without exercising the live
    # plugin stack on the runner; the nightly keeps it warm and, with the
    # heartbeat below, makes a dead runner / broken schedule VISIBLE instead
    # of looking identical to "all green". Scheduled runs always run pytest
    # (the change-detection step only self-skips on pull_request events).
    - cron: '0 9 * * *'
  pull_request:
    branches: [main]

# Concurrency: only one Tier 2 run at a time per PR. Self-hosted runner
# can't safely run two suites in parallel against the same hlds_linux
# subprocess port.
concurrency:
  group: tier2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: [self-hosted, ktp-tier2]
    timeout-minutes: 30

    env:
      # Self-hosted runner stages the test serverfiles tree at this path.
      # See tests/integration/CI_RUNNER_SETUP.md § "Stage test serverfiles".
      # Hardcoded (not `${{ vars.X || '...' }}`) because fork PRs cannot read
      # repo-scoped Actions variables — the expression silently falls through
      # to the default on every fork PR. We own the runner; path is canonical.
      KTP_HLDS_SERVERFILES: /opt/ktp-tier2-runner/serverfiles
      # Timeout multiplier. The self-hosted runner shares the data server
      # with 25 HLTV writers + MySQL, so async curl round-trips (Discord
      # embed POSTs, HUD ingest) can exceed the 1.0/5s window — that raced
      # the match-type routing tests (one of 12man/draft/ktp_ot/draft_ot
      # flaked per run). 2.0 = the _timing.py "busy CI runner" value; a
      # manual workflow_dispatch can still override.
      KTP_TEST_TIMEOUT_MULTIPLIER: ${{ inputs.timeout_multiplier || '2.0' }}
      # Tier 2 post-run reporting (1.5.22) — pytest_sessionfinish hook in
      # tests/integration/conftest.py writes a session-summary JSON here
      # IFF this env var is set; the post-pytest step reads it and POSTs
      # a Discord embed via the relay. Unset in dev to preserve the
      # "no extra files written" loop.
      KTP_TIER2_REPORT_PATH: tier2-report.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need diff against base for relevance detection on PRs.
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        run: |
          set -e
          # Non-PR events (workflow_dispatch / workflow_call / push) always run.
          # PR events: only run if integration tests, the smoke harness, or
          # this workflow file itself changed. ALL of tests/smoke/ is in the
          # filter — the integration conftest imports rcon/server_handle/
          # parse/asserts from it, so a PR breaking any of those must not
          # green-by-self-skip (it would then fail every Tier 2 run and all
          # caller smoke workflows post-merge). The self-hosted runner's
          # pre-staged serverfiles tree covers everything else Tier 2
          # exercises; changes to scripts/, docs/, config/, or any other
          # in-repo path don't invalidate the test surface so skipping
          # pytest is safe.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=1" >> "$GITHUB_OUTPUT"
            echo "Non-PR event ${{ github.event_name }}; will run pytest."
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base" "$head" \
              | grep -qE '^(tests/integration/|tests/smoke/|\.github/workflows/tier2-integration\.yml$)'; then
            echo "run=1" >> "$GITHUB_OUTPUT"
            echo "Relevant files changed; will run pytest."
          else
            echo "run=0" >> "$GITHUB_OUTPUT"
            echo "::notice::No tests/integration/, tests/smoke/, or workflow changes in this PR; skipping pytest (job still passes so the required check is satisfied)."
          fi

      - name: Set up Python
        if: steps.changes.outputs.run == '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test deps
        if: steps.changes.outputs.run == '1'
        run: |
          python -m pip install --upgrade pip
          # Pinned to the same versions used in dev. pytest-rerunfailures
          # mitigates transient flakes (e.g., a 200ms curl round-trip
          # racing a 100ms poll on a busy runner). 2 reruns max.
          # allure-pytest emits per-test JSON into --alluredir for the
          # post-run report; no Allure CLI install needed at this layer
          # (operators run `allure serve <downloaded-results>` locally).
          pip install pytest==9.0.3 pytest-rerunfailures==15.0 allure-pytest==2.13.5

      - name: Verify test artifacts present in serverfiles
        if: steps.changes.outputs.run == '1'
        run: |
          set -e
          SF="$KTP_HLDS_SERVERFILES"
          echo "Checking $SF for required test artifacts..."
          test -f "$SF/hlds_linux"               || { echo "MISSING: hlds_linux"; exit 1; }
          test -f "$SF/dod/addons/ktpamx/dlls/ktpamx_i386.so" || { echo "MISSING: ktpamx_i386.so"; exit 1; }
          test -f "$SF/dod/addons/ktpamx/modules/dodx_ktp_i386.so" || { echo "MISSING: dodx_ktp_i386.so"; exit 1; }
          test -f "$SF/dod/addons/ktpamx/plugins/KTPMatchHandler.amxx" || { echo "MISSING: KTPMatchHandler.amxx (must be test-mode build)"; exit 1; }
          test -f "$SF/dod/addons/ktpamx/plugins/KTPWitness.amxx" || { echo "MISSING: KTPWitness.amxx"; exit 1; }
          test -f "$SF/dod/addons/ktpamx/plugins/KTPPracticeMode.amxx" || { echo "MISSING: KTPPracticeMode.amxx (must be test-mode build)"; exit 1; }
          echo "All required artifacts present."

      - name: Run Tier 2 integration suite
        id: pytest
        if: steps.changes.outputs.run == '1'
        run: |
          # --reruns 2: retry transient failures up to 2 times before
          #   marking a test as failed. Catches I/O race flakes without
          #   masking real regressions (a true bug fails all 3 attempts).
          # --reruns-delay 1: 1s sleep between reruns to let any pending
          #   async work drain.
          # -v: verbose output for CI logs
          # -ra: short-test-summary for skipped + failed (visible in PR check)
          # --alluredir: per-test JSON for the always-uploaded Allure
          #   results bundle. Run `allure serve <download>` locally to
          #   view the HTML report; no CLI install on the runner needed.
          mkdir -p allure-results
          pytest tests/integration/ \
            --reruns 2 --reruns-delay 1 \
            -v -ra \
            --tb=short \
            --alluredir=./allure-results

      - name: Upload Allure results (always)
        if: always() && steps.changes.outputs.run == '1'
        uses: actions/upload-artifact@v4
        with:
          # Always uploaded so passing runs also have a report on hand
          # — useful for trend analysis (run-time creep, flake rate).
          # Operator: download + `allure serve <unzipped-dir>` for HTML.
          name: tier2-allure-results-${{ github.run_id }}
          path: allure-results/
          retention-days: 14
          if-no-files-found: warn

      - name: Post Tier 2 result embed to Discord
        if: always() && steps.changes.outputs.run == '1'
        # Self-hosted runner is on the data server, so /etc/ktp/discord-relay.conf
        # is readable directly — no GH-Actions secrets needed for the relay
        # creds. Helper script reads RELAY_URL + AUTH_SECRET + TIER2_REPORT_CHANNEL
        # (default 1498813261263405097, the scheduled-report channel where
        # perf-rollup + canary embeds also flow). Override via the conf file
        # if you want a dedicated channel for Tier 2 results.
        #
        # Failure here does NOT mask a real test failure — the embed step
        # logs and exits 0 so the workflow's overall result reflects pytest's
        # exit code, not a transient relay issue.
        run: |
          if [ ! -f tier2-report.json ]; then
            echo "tier2-report.json not produced (pytest may have crashed before sessionfinish hook); skip embed"
            exit 0
          fi
          # `|| true` — see comment above. A relay/embed failure is a
          # noise issue, not a test failure.
          python3 scripts/post-tier2-result.py \
            --report tier2-report.json \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --branch "${{ github.ref }}" \
            --commit-sha "${{ github.sha }}" \
            || echo "WARNING: post-tier2-result.py exited non-zero; embed not posted (test result unaffected)"

      - name: Upload Tier 2 report JSON (always)
        if: always() && steps.changes.outputs.run == '1'
        uses: actions/upload-artifact@v4
        with:
          # Useful for post-mortem analysis even after the embed has been
          # archived in Discord. Same JSON the embed was built from.
          name: tier2-report-${{ github.run_id }}
          path: tier2-report.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Collect crash artifacts on failure
        if: failure() && steps.changes.outputs.run == '1'
        run: |
          # If hlds_linux crashed during the run, /tmp will have a core
          # file. Capture it for forensic analysis.
          mkdir -p ci-artifacts
          cp /tmp/core.hlds_linux.* ci-artifacts/ 2>/dev/null || true
          cp "$KTP_HLDS_SERVERFILES"/dod/addons/ktpamx/logs/L*.log ci-artifacts/ 2>/dev/null || true
          cp "$KTP_HLDS_SERVERFILES"/dod/addons/ktpamx/logs/witness.jsonl ci-artifacts/ 2>/dev/null || true
          ls -la ci-artifacts/

      - name: Upload artifacts on failure
        if: failure() && steps.changes.outputs.run == '1'
        uses: actions/upload-artifact@v4
        with:
          name: tier2-failure-artifacts-${{ github.run_id }}
          path: ci-artifacts/
          retention-days: 14

      - name: Record Tier 2 last-run marker (heartbeat input)
        if: always() && steps.changes.outputs.run == '1'
        # scripts/ktp-tier2-heartbeat.sh (data-server cron) reads this marker
        # and alerts to Discord if Tier 2 hasn't run within its window or the
        # last run failed — so a dead self-hosted runner / broken schedule is
        # VISIBLE instead of looking identical to "all green". Written to a
        # runner-writable path next to the serverfiles tree; the cron (root)
        # reads it. Gated on run == '1' so a self-skipped docs-only PR doesn't
        # stamp an empty-outcome marker over the last real run.
        run: |
          MARKER="$(dirname "$KTP_HLDS_SERVERFILES")/tier2-last-run.json"
          printf '{"ts": %s, "outcome": "%s", "run_id": "%s", "event": "%s"}\n' \
            "$(date +%s)" "${{ steps.pytest.outcome }}" "${{ github.run_id }}" "${{ github.event_name }}" \
            > "$MARKER"
          echo "Wrote $MARKER ($(cat "$MARKER"))"
