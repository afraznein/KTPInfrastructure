# KTP Fleet — Expected binary md5s (source of truth)
#
# Used by scripts/audit-fleet-drift.py to detect drift between the live fleet
# state and what the repo says each host SHOULD have. Values are the first
# 16 chars of md5sum output (matches the fleet-drift-snapshot.sh format).
#
# Update after each successful fleet deployment. Canary instances will flag
# as drift until the fleet-wide promotion completes — that's expected and
# informative.
#
# Format: one `relative/path = md5prefix16` per line. Paths are relative to
# each host's ~/dod-27015/serverfiles/ (the audit checks port 27015). `#`
# starts a comment; [section] headers scope expected values by host group.
#
# [default] applies to all hosts unless a [baremetal] / [vps] section
# overrides. Group overrides are useful if the VPS runs a different subset
# of modules — currently all KTP binaries should be identical fleet-wide.

[default]

