# KTP Fleet — Expected sysctl values (source of truth)
#
# Used by scripts/audit-fleet-drift.py to detect drift between the live fleet
# state and what the repo says each host SHOULD have. Baremetal hosts are the
# primary audience; the Chicago VPS is expected to diverge on several keys
# (no isolcpus, different kernel params, etc.) — per-group overrides below.
#
# Format: one `key = value` per line. `#` starts a comment. Sections are
# optional — if a section header matches a host's group (see audit tool's
# HOSTS config), those values override the default section for that group.
#
# [default] applies to all hosts unless a group-specific section overrides.
# [baremetal] applies to hosts tagged `baremetal` in the audit tool.
# [vps] applies to hosts tagged `vps` (currently Chicago only).

[default]

# ---------------------------------------------------------------------------
# Phase 2 performance tuning (applied fleet-wide 2026-04-13)
# ---------------------------------------------------------------------------
# Disable RT throttling — SCHED_FIFO game servers must never be descheduled
kernel.sched_rt_runtime_us = -1
# Prevent timer migration to isolated game CPUs
kernel.timer_migration = 0
# Disable scheduler autogroup (CFS grouping by tty)
kernel.sched_autogroup_enabled = 0
# Only swap under extreme memory pressure
vm.swappiness = 1
# Reduce vmstat IPI frequency on isolated CPUs
vm.stat_interval = 120
# Increase NAPI budget for faster packet drain on IRQ CPUs
net.core.netdev_budget = 1200
net.core.netdev_budget_usecs = 8000
# Disable unnecessary per-packet timestamping
net.core.netdev_tstamp_prequeue = 0
# Kernel queue size for backlogged packets
net.core.netdev_max_backlog = 5000

# ---------------------------------------------------------------------------
# UDP buffers (25 MB)
# ---------------------------------------------------------------------------
net.core.rmem_max = 26214400
net.core.rmem_default = 26214400
net.core.wmem_max = 26214400
net.core.wmem_default = 26214400

# ---------------------------------------------------------------------------
# VM / writeback tuning
# ---------------------------------------------------------------------------
vm.dirty_ratio = 5
vm.dirty_background_ratio = 5

# ---------------------------------------------------------------------------
# Network latency
# ---------------------------------------------------------------------------
net.ipv4.tcp_low_latency = 1
net.core.busy_read = 100
net.core.busy_poll = 100
kernel.nmi_watchdog = 0
# No soft-lockup watchdog timers on isolated game cores (fleet-wide 2026-07-02)
kernel.watchdog = 0

# ---------------------------------------------------------------------------
# Core dump (for crash debugging)
# ---------------------------------------------------------------------------
kernel.core_pattern = /tmp/core.%e.%p.%t

[vps]
# Chicago VPS has no isolcpus, uses smaller budgets, and runs a different
# NIC path — but most performance tunings still apply. Group override lets
# the audit tool skip/relax checks that don't make sense on VPS.
#
# (Currently all defaults apply to Chicago as well — if that changes, add
# key = value overrides here. Keys not present here inherit from [default].)
