# KTP Fleet — Expected /etc/rc.local contents (source of truth)
#
# Used by scripts/audit-fleet-drift.py. Each line is a GLOB pattern
# (`*` = any chars, `?` = single char, `[abc]` = class) that must match
# at least one non-comment line in the host's /etc/rc.local.
#
# Glob patterns are the right fit because rc.local has legitimate per-host
# variation (NIC name: enp1s0f0, enp2s0f0, eth0) and per-script-style
# variation (baremetal uses `[ -f ... ] &&` guards, Chicago uses
# `command -v`). Literal-line matching would false-positive on all of that.
#
# Snapshot section: `/etc/rc.local (non-comment, sorted)` (from
# fleet-drift-snapshot.sh). Each line is a separate fact. A pattern is
# "present" if at least one fact matches via fnmatch.
#
# Extra lines on a host are ignored — we only enforce presence of the KTP
# tuning intent, not exhaustive whitelisting.

# -----------------------------------------------------------------------------
# Fleet-wide (baremetal + VPS)
# -----------------------------------------------------------------------------

[default]

# CPU governor → performance (for-loop line iterates cpufreq paths)
*cpufreq/scaling_governor*

# CPU idle state disable (inner for-loop, state*/disable path)
*state*disable*

# Transparent HugePage: enabled=never (fleet standard 2026-07-02; the rc.local
# line should write the same value tmpfiles.d/ktp-thp.conf owns so boot
# ordering cannot fight).
# STATUS: fleet rc.local patched to `never` on all 5 hosts 2026-07-07
# (operator-approved; backups at /etc/rc.local.bak-thpnever-20260707) — this
# pattern matches the live fleet.
*never*transparent_hugepage/enabled*

# Transparent HugePage: defrag=never
*never*transparent_hugepage/defrag*

# VM compaction proactiveness off
*compaction_proactiveness*

# KSM disabled
*ksm/run*

# LRU gen min TTL
*lru_gen/min_ttl_ms*

# NIC offloads off (gro, tso, lro)
*ethtool -K*gro off*
*ethtool -K*tso off*
*ethtool -K*lro off*

# NIC interrupt coalescing tight
*ethtool -C*rx-usecs*

# iptables NOTRACK on game UDP (both directions, ADD rule — filtered from DELETE noop lines)
*iptables -t raw -A PREROUTING*27015:27019*NOTRACK*
*iptables -t raw -A OUTPUT*27015:27019*NOTRACK*

# NIC ring buffer to 4096 (any interface)
*ethtool -G*rx 4096 tx 4096*

# Queue discipline: pfifo_fast (any interface)
*tc qdisc*pfifo_fast*
