// HLTV Proxy 1 — connects to ktp-game-1
// Docker service DNS resolves ktp-game-1 on the shared compose network.
// Internal game port is always 27015 (host-mapped to 27016 externally).

connect ktp-game-1:27015
port 27020
hostname "KTP Test HLTV 1 (Anzio)"

delay 0
nomaster 1
maxclients 32

// Recording settings (match production)
demodelay 30
demotimeout 60

// Performance
rate 20000
updaterate 20
cmdrate 40
