// HLTV Proxy 1 -- connects to ktp-game-1 in the local docker stack
// Internal game port is 27015 (host-mapped to 27016 externally)

hostname "KTP Test HLTV 1 (Anzio)"
port 27020

// Broadcast 60s behind real-time (matches the production proxy delay).
// Required for hltv_sync end-to-end testing locally — without this the proxy
// streams in real-time and the backend's reorder buffer has nothing to align.
delay 60

// Admin access — sampled by data backend via hltv_sync to learn
// (delaySeconds, activeTime) from `status` rcon
adminpassword "localdev-rcon"

// Proxy settings
proxypassword "localdev-proxy"
maxclients 32
nomaster 1

// Recording
demodelay 30
demotimeout 60

// Performance
rate 20000
updaterate 20
cmdrate 40

// Connect to game server 1 (Docker service DNS).
// `connect` (not `autoconnect`) — the auto-load DispatchCommand path doesn't
// recognize `autoconnect` in this binary, so the proxy never initiates.
connect ktp-game-1:27015
