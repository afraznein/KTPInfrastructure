// HLTV Proxy 2 — connects to ktp-game-2
// Docker service DNS resolves ktp-game-2 on the shared compose network.
// Internal game port is always 27015 (host-mapped to 27017 externally).

connect ktp-game-2:27015
port 27021
hostname "KTP Test HLTV 2 (Flash)"

delay 0
nomaster 1
maxclients 32

// Recording settings (match production)
demodelay 30
demotimeout 60

// Performance
rate 20000
updaterate 20
cmdrate 40
