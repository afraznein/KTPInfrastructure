// HLTV Proxy 2 -- connects to ktp-game-2 in the local docker stack
// Internal game port is 27015 (host-mapped to 27017 externally)

hostname "KTP Test HLTV 2 (Flash)"
port 27021

// Admin access
adminpassword "localdev-rcon"

// Proxy settings
proxypassword "localdev-proxy"
maxclients 32
nomaster 1

// Recording
demodelay 30
demotimeout 60

// Performance
rate 20000
updaterate 20
cmdrate 40

// Connect to game server 2 (Docker service DNS).
// `connect` (not `autoconnect`) — the auto-load DispatchCommand path doesn't
// recognize `autoconnect` in this binary, so the proxy never initiates.
connect ktp-game-2:27015
